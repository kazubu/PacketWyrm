name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  host:
    name: host stack (sw/)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libyaml-dev libjson-c-dev libssl-dev \
            xxd curl iproute2
      - name: build
        working-directory: sw
        run: make -j
      - name: unit tests
        working-directory: sw
        run: make test
      - name: e2e smoke (daemon + CLI)
        working-directory: sw
        run: make e2e
      - name: staged install
        working-directory: sw
        run: |
          make install DESTDIR=/tmp/pw-staging
          test -x /tmp/pw-staging/usr/local/sbin/packetwyrmd
          test -x /tmp/pw-staging/usr/local/sbin/packetwyrm-proxyd
          test -x /tmp/pw-staging/usr/local/bin/pktwyrm
          test -f /tmp/pw-staging/lib/systemd/system/packetwyrmd.service
          test -f /tmp/pw-staging/lib/systemd/system/packetwyrm-proxyd.service

  rtl-sim:
    name: RTL data-plane sim (Verilator)
    runs-on: ubuntu-24.04
    env:
      # Pin to the Verilator the project is developed + validated against.
      # ubuntu-24.04's apt verilator is 5.020, which has bugs that break this
      # suite (a -j thread-pool internal crash, BLKLOOPINIT on the large
      # histogram-reset loops, and a block-RAM read-timing quirk that makes the
      # histogram read back 0) -- none reproduce on 5.032 or on real hardware.
      VERILATOR_VERSION: v5.032
    steps:
      - uses: actions/checkout@v4
        with:
          # sim_all's MAC targets (mac_axis_cdc, mac_loopback) and the fpga lint
          # pull the Taxi 10G MAC/AXIS sources from the vendored submodule, so it
          # must be checked out here (default checkout skips submodules).
          submodules: recursive
      - name: cache verilator
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: /opt/verilator
          key: verilator-${{ env.VERILATOR_VERSION }}-ubuntu-24.04
      - name: build verilator (cache miss)
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git make autoconf g++ flex bison libfl-dev help2man python3
          git clone --depth 1 --branch "$VERILATOR_VERSION" \
            https://github.com/verilator/verilator /tmp/verilator
          cd /tmp/verilator
          autoconf && ./configure --prefix=/opt/verilator
          make -j"$(nproc)"
          sudo make install
      - name: verilator on PATH + C++ toolchain + sim deps
        run: |
          echo "/opt/verilator/bin" >> "$GITHUB_PATH"
          # build-essential for the Verilator-generated C++; the libyaml/json-c/
          # pkg-config trio is for sw/build/gen_bar_vectors, which sim_all's
          # wire-vector target builds to produce the golden BAR image.
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libyaml-dev libjson-c-dev
      - name: build + run sim (data plane + axis serial)
        working-directory: sim
        run: make sim_all
      - name: lint AS02MC04 RTL
        working-directory: fpga/as02mc04
        run: make lint
