name: Release

# Push a version tag (e.g. `v0.2.0`) and this builds the Debian package and
# publishes a GitHub Release with the .deb attached. The package version is
# derived from the tag by packaging/build-deb.sh (`git describe`), so tag with
# a leading-digit semver like v1.2.3.
on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN needs write access to create the release + upload
# the asset.
permissions:
  contents: write

jobs:
  release:
    name: build .deb + publish release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so build-deb.sh's `git describe --tags` resolves
          # the pushed tag into the package version (a shallow checkout has none).
          fetch-depth: 0

      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libyaml-dev libjson-c-dev libssl-dev \
            python3

      # Gate the release on the unit tests so a tag never ships a broken build.
      - name: build + unit tests
        working-directory: sw
        run: |
          make -j
          make test

      - name: build .deb
        run: make -C sw deb

      - name: inspect package
        run: |
          deb=$(ls -t packaging/dist/*.deb | head -1)
          [ -n "$deb" ] || { echo "no .deb produced"; exit 1; }
          echo "DEB=$deb" >> "$GITHUB_ENV"
          echo "== dpkg-deb --info =="; dpkg-deb --info "$deb"
          echo "== dpkg-deb --contents =="; dpkg-deb --contents "$deb"

      # Prefer the matching CHANGELOG.md section as release notes (a heading
      # `## <tag> ...`, e.g. `## v0.1.0 - 2026-07-11`); fall back to
      # auto-generated notes if the tag has no section.
      - name: assemble release notes
        run: |
          notes=$(awk -v tag="$GITHUB_REF_NAME" '
            $0 ~ "^## " tag "([ \t]|$)" {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "NOTES_ARG=--generate-notes" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s\n' "$notes" > /tmp/relnotes.md
          # GitHub caps the release body at 125000 chars. A big CHANGELOG
          # section (the pre-release history all lands under v0.1.0) blows past
          # that, so truncate at a line boundary well under the limit and point
          # to the full CHANGELOG at this tag.
          LIMIT=110000
          if [ "$(wc -c < /tmp/relnotes.md)" -gt "$LIMIT" ]; then
            repo="${GITHUB_REPOSITORY:-kazubu/PacketWyrm}"
            head -c "$LIMIT" /tmp/relnotes.md | sed '$d' > /tmp/relnotes.trunc
            {
              cat /tmp/relnotes.trunc
              printf '\n\n---\n\n'
              printf '_Release notes truncated. See the full changelog for **%s** at_\n' "$GITHUB_REF_NAME"
              printf 'https://github.com/%s/blob/%s/CHANGELOG.md\n' "$repo" "$GITHUB_REF_NAME"
            } > /tmp/relnotes.md
          fi
          echo "NOTES_ARG=--notes-file=/tmp/relnotes.md" >> "$GITHUB_ENV"

      - name: publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$DEB" \
            --title "$GITHUB_REF_NAME" \
            $NOTES_ARG \
            --verify-tag
