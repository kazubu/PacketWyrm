# OpenOCD config for the AS02MC04 (Kintex UltraScale+ KU3P) over a
# Digilent JTAG-HS3 cable (FT232H, USB 0403:6014, iProduct "Digilent
# USB Device").
#
# The HS3 layout is shipped with OpenOCD as digilent_jtag_hs3.cfg, so
# we do not hand-roll the FTDI bit layout here. The board itself is a
# single TAP: IR length 6, IDCODE 0x04a63093 (KU3P, UG570). OpenOCD
# defaults IR length to 2, so it must be stated explicitly.
#
# Quick checks:
#   openocd -f openocd/as02mc04-hs3.cfg -c "init; scan_chain; exit"
#   openocd -f openocd/as02mc04-hs3.cfg -c "init; pld load 0 <bit>; exit"
#
# The user's probe reports serial 210299364872; uncomment adapter
# serial below if more than one FTDI cable is ever attached at once.

source [find interface/ftdi/digilent_jtag_hs3.cfg]
# adapter serial 210299364872

transport select jtag

# 1 MHz is safe for probing; programming runs happily at 10 MHz (set
# from the command line for the svf/pld-load step).
adapter speed 1000
reset_config none

jtag newtap xcku3p tap -irlen 6 -expected-id 0x04a63093

# Xilinx UltraScale-style PLD. svf playback also works for SVF built
# from the Vivado bitstream (write_cfgmem -format svf).
pld device virtex2 xcku3p.tap 1
