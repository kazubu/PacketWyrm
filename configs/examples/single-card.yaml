# Single-card PacketWyrm example.
#
# One AS02MC04 card, two ports (p0, p1), one logical interface bound to
# p0 over VLAN 100, and one same-card flow p0 -> p1 with full
# loss / latency / jitter measurements.

system:
  name: "pw-single-card"
  mode: "multi-card"
  default_speed: "10g"

cards:
  - id: 0
    name: "card0"
    pci: "0000:03:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }

logical_interfaces:
  - id: 1000
    global_port: 0
    vlan: 100
    mac: "02:a5:02:00:00:64"
    mtu: 9000
    punt:
      arp: true
      ipv6_nd: true
      lldp: true
      icmp: true
      bgp: true
      ospf: true

flows:
  - id: 1
    name: "same-card-flow"
    tx_global_port: 0
    rx_global_port: 1
    logical_if_id: 1000

    l2:
      src_mac: "02:a5:02:00:00:01"
      dst_mac: "02:a5:02:00:00:02"
      vlan: 100

    ipv4:
      src: "192.0.2.1"
      dst: "192.0.2.2"
      ttl: 64
      dscp: 0

    udp:
      src_port: 49152
      dst_port: 50001

    traffic:
      frame_len: 512
      rate_bps: 1000000000
      burst_size: 1
      payload: "increment"
      insert_sequence: true
      insert_timestamp: true

    measurements:
      loss: true
      latency: true
      jitter: true
