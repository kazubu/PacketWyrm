# Phase 3 HW: 32-flow scale test over the SFP+ DAC loopback. Validates the
# TEST_RX flow-id map (pw_flowid_map): 32 distinct UDP/IPv4 flows, each its own
# flow_id + udp_dst, classified by the flow-id map (not classifier rules) ->
# 32 measured flows past the classifier's ~16-entry limit. TX p0 -> DAC -> RX p1;
# expect loss=0 on every flow. ~200 Mbps each (~6.4 G aggregate, under 10 G).
system: { name: "pw-scale32", mode: "multi-card", default_speed: "10g",
          control_socket: "/tmp/pw-phase3.sock" }

cards:
  - id: 0
    name: "card0"
    pci: "0000:07:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }

logical_interfaces:
  - id: 1000
    global_port: 0
    vlan: 100
    mac: "02:a5:02:00:00:64"
    mtu: 9000
    punt: { arp: false, ipv6_nd: false, lldp: false, icmp: false, bgp: false, ospf: false }

flows:
  - id: 1
    name: "f1"
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:01:01", dst_mac: "02:a5:02:00:01:02", vlan: 100 }
    ipv4: { src: "192.0.2.1", dst: "198.51.100.1" }
    udp:  { src_port: 49152, dst_port: 50001 }
    traffic: { frame_len: 256, rate_bps: 200000000 }
    measurements: { loss: true, latency: true, jitter: true }

  - id: 2
    name: "f2"
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:02:01", dst_mac: "02:a5:02:00:02:02", vlan: 100 }
