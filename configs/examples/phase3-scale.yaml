# Phase 3 hardware: 32 concurrent TEST_RX flows over the SFP+ DAC loopback,
# 16 generated per egress port -- exercises the multi-flow generator and the
# scaled 32/32/16 data plane (32 classifier rows, 32 flow rows, BRAM histogram).
#
# flows 1..16  : p0 -> p1, udp 50001..50016
# flows 17..32 : p1 -> p0, udp 50017..50032
# Distinct udp_dst per flow so the classifier separates them. Per-flow rate
# kept modest (250 Mbps) so 16 flows/port stay within the 10G line rate.

system:
  name: "pw-phase3-scale32"
  mode: "multi-card"
  default_speed: "10g"
  control_socket: "/tmp/pw-phase3.sock"

cards:
  - id: 0
    name: "card0"
    pci: "0000:07:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }

logical_interfaces:
  - id: 1000
    global_port: 0
    vlan: 100
    mac: "02:a5:02:00:00:64"
    mtu: 9000
    punt: { arp: false, ipv6_nd: false, lldp: false, icmp: false, bgp: false, ospf: false }
  - id: 1001
    global_port: 1
    vlan: 101
    mac: "02:a5:02:00:00:65"
    mtu: 9000
    punt: { arp: false, ipv6_nd: false, lldp: false, icmp: false, bgp: false, ospf: false }

flows:
  - id: 1
    name: "f1"
    tx_global_port: 0
    rx_global_port: 1
    logical_if_id: 1000
    l2:   { src_mac: "02:a5:02:00:00:01", dst_mac: "02:a5:02:00:00:02" }
    ipv4: { src: "192.0.2.1", dst: "192.0.2.2", ttl: 64, dscp: 0 }
    udp:  { src_port: 49152, dst_port: 50001 }
    traffic: { frame_len: 256, rate_bps: 250000000, burst_size: 2,
               payload: "increment", insert_sequence: true, insert_timestamp: true }
    measurements: { loss: true, latency: true, jitter: true }
  - id: 2
    name: "f2"
    tx_global_port: 0
    rx_global_port: 1
    logical_if_id: 1000
    l2:   { src_mac: "02:a5:02:00:00:01", dst_mac: "02:a5:02:00:00:02" }
