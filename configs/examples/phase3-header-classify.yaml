# Phase 3 HW: hash exact-classifier scale test over the SFP+ DAC loopback.
# 24 UDP/IPv4 flows classified by EXACT HEADER tuple {dst IP, dst port, src port,
# proto} via the hash exact table (classify: header) -- payload-agnostic, and
# well beyond the field classifier's ~12-comparator cap. The compiler finds a
# collision-free hash seed; each frame's header hashes to its checker slot. TX p0
# -> DAC -> RX p1; expect loss=0 on every flow.
system: { name: "pw-hashscale", mode: "multi-card", default_speed: "10g",
          control_socket: "/tmp/pw-phase3.sock" }

cards:
  - id: 0
    name: "card0"
    pci: "0000:07:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }

flows:
  - id: 1
    name: "h1"
    classify: header
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:01:01", dst_mac: "02:a5:02:00:01:02" }
    ipv4: { src: "192.0.2.1", dst: "198.51.100.1" }
    udp:  { src_port: 49152, dst_port: 50001 }
    traffic: { frame_len: 256, rate_bps: 200000000 }
    measurements: { loss: true, latency: true, jitter: true }

  - id: 2
    name: "h2"
    classify: header
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:02:01", dst_mac: "02:a5:02:00:02:02" }
    ipv4: { src: "192.0.2.2", dst: "198.51.100.2" }
