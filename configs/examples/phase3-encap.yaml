# Phase 3 hardware bring-up: encapsulated TEST_RX flow over the SFP+ DAC loop.
#
# The generator wraps the inner IP/UDP/test frame in an IPIP tunnel (outer
# IPv4, proto 4), sends it p0 -> DAC -> p1; the RX parser auto-decapsulates
# the tunnel and classifies on the INNER test header, so the TEST_RX checker
# measures the inner flow. Expect loss=0 at line rate -- this exercises the
# full encap TX build + egress inner-tx_timestamp + RX decap path on silicon.
#
# rx_expect: tunneled -- a DAC loopback returns the whole encapsulated frame
# (the parser decaps regardless; rx_expect is recorded for the daemon).

system:
  name: "pw-phase3-encap"
  mode: "multi-card"
  default_speed: "10g"
  control_socket: "/tmp/pw-phase3.sock"

cards:
  - id: 0
    name: "card0"
    pci: "0000:07:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }

logical_interfaces:
  - id: 1000
    global_port: 0
    vlan: 100
    mac: "02:a5:02:00:00:64"
    mtu: 9000
    punt:
      arp: false
      ipv6_nd: false
      lldp: false
      icmp: false
      bgp: false
      ospf: false

flows:
  - id: 1
    name: "ipip-loopback"
    tx_global_port: 0
    rx_global_port: 1
    logical_if_id: 1000

    l2:
      src_mac: "02:a5:02:00:00:01"
      dst_mac: "02:a5:02:00:00:02"
      vlan: 100

    ipv4:                          # inner
      src: "192.0.2.1"
      dst: "192.0.2.2"
      ttl: 64
      dscp: 0

    udp:
      src_port: 49152
      dst_port: 50001

    encap:
      type: ipip                   # outer IPv4, proto 4 (v4-in)
      outer:
        ipv4:
          src: "10.0.0.1"
          dst: "10.0.0.2"
          ttl: 64
          dscp: 0
    rx_expect: tunneled

    traffic:
      frame_len: 512
      rate_bps: 1000000000
      burst_size: 1
      payload: "increment"
      insert_sequence: true
      insert_timestamp: true

    measurements:
      loss: true
      latency: true
      jitter: true
