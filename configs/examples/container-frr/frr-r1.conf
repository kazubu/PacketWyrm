! FRR / vtysh config for the r1 example routing namespace.
! Loaded by start-r1.sh after the PacketWyrm TAP is moved into
! the namespace and IP-addressed.

hostname pw-r1
log file /var/log/frr/r1.log

router bgp 65001
 bgp router-id 192.0.2.1
 no bgp default ipv4-unicast
 neighbor 192.0.2.2 remote-as 65002
 neighbor 192.0.2.2 description peer-via-PacketWyrm
 address-family ipv4 unicast
  neighbor 192.0.2.2 activate
  network 198.51.100.0/24
 exit-address-family
!
ip route 198.51.100.0/24 Null0
!
line vty
