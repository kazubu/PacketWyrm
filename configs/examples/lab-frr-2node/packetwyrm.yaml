# Two-router FRR lab: PacketWyrm side.
#
# One AS02MC04 card, two SFP+ ports.  Each port has one VLAN-100
# logical interface; the lab spec attaches an FRR router to each TAP,
# and the two routers peer eBGP across the DUT under test.

system:
  name: "pw-lab-frr-2node"
  mode: "multi-card"
  default_speed: "10g"

cards:
  - id: 0
    name: "card0"
    pci: "0000:03:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }

logical_interfaces:
  - id: 1000
    global_port: 0
    vlan: 100
    mac: "02:a5:02:00:00:64"
    mtu: 9000
    punt: { arp: true, ipv6_nd: true, lldp: true, icmp: true, bgp: true }

  - id: 1001
    global_port: 1
    vlan: 100
    mac: "02:a5:02:00:01:64"
    mtu: 9000
    punt: { arp: true, ipv6_nd: true, lldp: true, icmp: true, bgp: true }

flows: []
