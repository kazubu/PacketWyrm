# Phase 3 HW SOAK: MAX SCALE (32 flows), ENCAP MATRIX x {UDP, TCP}.
# 32 flows cycle through L4 {UDP, TCP} x encap {none, IPIP, GRE, EtherIP} x
# {v4,v6}, so the parser's full auto-decap + inner-L3/L4 (UDP and TCP) +
# test-header classification is exercised across the matrix -- including the
# deepest classify (EtherIP v6-in-v6 TCP = 166 B, the HDR_BYTES=176 worst case).
# TCP here is the stateless segment generator (fixed 20-B header, SYN). 32 x
# 200 Mbps = 6.4 G aggregate (under 10 G): lost_est must stay 0, so any
# loss/ooo/dup/fcs over the run is a real problem, not oversubscription.
system: { name: "pw-soak-matrix", mode: "multi-card", default_speed: "10g",
          control_socket: "/tmp/pw-soak.sock" }
cards:
  - id: 0
    name: "card0"
    pci: "0000:07:00.0"
    ports:
      - { local_port: 0, global_port: 0, name: "p0" }
      - { local_port: 1, global_port: 1, name: "p1" }
logical_interfaces:
  - id: 1000
    global_port: 0
    vlan: 100
    mac: "02:a5:02:00:00:64"
    mtu: 9000
    punt: { arp: false, ipv6_nd: false, lldp: false, icmp: false, bgp: false, ospf: false }
flows:
  - id: 1
    name: "udp-plain-v4-1"
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:01:01", dst_mac: "02:a5:02:00:01:02", vlan: 100 }
    ipv4: { src: "192.0.2.2", dst: "198.51.100.2" }
    udp:  { src_port: 49152, dst_port: 50001 }
    traffic: { frame_len: 256, rate_bps: 200000000 }
    measurements: { loss: true, latency: true, jitter: true }

  - id: 2
    name: "udp-plain-v6-2"
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:02:01", dst_mac: "02:a5:02:00:02:02", vlan: 100 }
    ipv6: { src: "2001:db8:1::2", dst: "2001:db8:2::2" }
    udp:  { src_port: 49152, dst_port: 50002 }
    traffic: { frame_len: 256, rate_bps: 200000000 }
    measurements: { loss: true, latency: true, jitter: true }

  - id: 3
    name: "udp-ipip-v4v4-3"
    tx_global_port: 0
    rx_global_port: 1
    l2: { src_mac: "02:a5:02:00:03:01", dst_mac: "02:a5:02:00:03:02", vlan: 100 }
    ipv4: { src: "192.0.2.4", dst: "198.51.100.4" }
    udp:  { src_port: 49152, dst_port: 50003 }
    encap:
      type: ipip
      outer: { ipv4: { src: "10.0.0.3", dst: "10.1.0.3" } }
    rx_expect: tunneled
    traffic: { frame_len: 256, rate_bps: 200000000 }
    measurements: { loss: true, latency: true, jitter: true }

